name: simple-komga

services:
  simple-komga:
    image: ${SIMPLE_KOMGA_IMAGE:-jdk1107/simple-komga}:${SIMPLE_KOMGA_VERSION:-1.0.4}
    restart: unless-stopped
    ports:
      - "${SIMPLE_KOMGA_BIND:-127.0.0.1:80}:80"
    depends_on:
      komga:
        condition: service_started
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  komga:
    image: ${KOMGA_IMAGE:-gotson/komga:latest}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - "${KOMGA_BIND:-127.0.0.1:25600}:25600"
    volumes:
      - ${KOMGA_CONFIG_PATH:-./data/komga/config}:/config
      - ${COMICS_PATH:-./data/comics}:/data:ro

volumes:
  caddy_data:
  caddy_config:
